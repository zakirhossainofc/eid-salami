<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Spin Wheel</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  text-align:center;
  background:linear-gradient(135deg,#0f5132,#198754);
  color:white;
  padding:20px;
}

.eid{
  font-size:34px;
  font-weight:bold;
  background:linear-gradient(45deg,#FFD700,#fff3b0);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.title{
  font-size:26px;
  margin-top:5px;
}

#wrapper{
  position:relative;
  width:360px;
  margin:auto;
}

canvas{
  background:white;
  border-radius:50%;
  box-shadow:0 0 25px rgba(0,0,0,0.4);
}

.pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  font-size:40px;
}

button{
  margin-top:25px;
  padding:15px 40px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#FFD700,#f9d423);
  color:#333;
  font-weight:bold;
  cursor:pointer;
}

#result{
  font-size:30px;
  margin-top:25px;
  font-weight:bold;
}

.fun{
  margin-top:10px;
  font-size:20px;
}

.footer{
  margin-top:25px;
  font-size:16px;
}

.confetti{
  position:fixed;
  width:10px;
  height:10px;
  top:-10px;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(100vh) rotate(720deg);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="eid">✨ Blessed Eid Mubarak ✨</div>
<div class="title">🎉 Spin the Wheel 🎁</div>

<div id="wrapper">
  <div class="pointer">▼</div>
  <canvas id="wheel" width="360" height="360"></canvas>
</div>

<button onclick="spin()">SPIN</button>

<div id="result"></div>

<div class="fun">🥹 Chocolate khake lena 🍫🫰</div>

<div class="footer">
  Provide your <b>Bkash</b> QR Code in the comments section
</div>

<script>
let canvas = document.getElementById("wheel");
let ctx = canvas.getContext("2d");

let numbers = [20, 30, 40, 50];
let sections = numbers.length;
let angle = 2 * Math.PI / sections;
let rotation = 0;
let spinning = false;

function drawWheel(){
  ctx.clearRect(0,0,360,360);

  for(let i=0; i<sections; i++){
    ctx.beginPath();
    ctx.moveTo(180,180);
    ctx.arc(180,180,170,i*angle+rotation,(i+1)*angle+rotation);
    ctx.fillStyle = i%2 ? "#FFD700" : "#4CAF50";
    ctx.fill();

    ctx.save();
    ctx.translate(180,180);
    ctx.rotate(i*angle+angle/2+rotation);
    ctx.textAlign="right";
    ctx.fillStyle="#000";
    ctx.font="bold 22px Arial";
    ctx.fillText(numbers[i],150,8);
    ctx.restore();
  }
}

drawWheel();

function spin(){
  if(spinning) return;
  spinning = true;

  let speed = Math.random()*0.35 + 0.3;

  let animation = setInterval(()=>{
    rotation += speed;
    speed *= 0.97;
    drawWheel();

    if(speed < 0.002){
      clearInterval(animation);

      let normalized = (2*Math.PI - rotation % (2*Math.PI));
      let index = Math.floor(normalized / angle) % sections;
      let result = numbers[index];

      document.getElementById("result").innerHTML =
        "🎉 Your number: <b>" + result + "</b> 💸";

      celebrate();
      spinning = false;
    }
  },30);
}

function celebrate(){
  for(let i=0; i<100; i++){
    let conf = document.createElement("div");
    conf.className = "confetti";
    conf.style.left = Math.random()*100 + "vw";
    conf.style.background = ["#FFD700","#ff4d6d","#00e676","#40c4ff"][Math.floor(Math.random()*4)];
    conf.style.animationDuration = (Math.random()*2+2) + "s";

    document.body.appendChild(conf);
    setTimeout(()=>conf.remove(),3000);
  }
}
</script>

</body>
</html>
